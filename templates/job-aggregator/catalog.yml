# 가정: 도메인 설명에 명시되지 않은 항목은 도메인 지식 기반으로 보완함
# 가정: 규모는 MVP 기본값 (약 17개 블럭)
# 가정: 주 사용자는 "구직자"이며, "운영자(어드민)"는 데이터 품질 관리/신고 처리 역할로 보완
# 가정: 잡코리아/사람인/워크넷은 공식 Open API 부재 영역이 있으므로 크롤링 + 표준화 파이프라인 가정
# 가정: 인증은 이메일/소셜(Google, Kakao) 로그인 표준 패턴 가정
# 가정: 알림 채널은 이메일 + 브라우저 푸시 (MVP), 카카오 알림톡은 optional
name: 채용공고 통합 검색 서비스
domain: job-aggregator

worlds:
  - id: w-seeker
    title: 구직자
    icon: 🔍
    description: 흩어진 공고를 한 곳에서 검색·저장·알림 받는 사용자 흐름
    slug: seeker             # 멀티모듈 emit 시 :domain-seeker

  - id: w-ingest
    title: 데이터 수집·정제
    icon: 🛠️
    description: 외부 채용 사이트에서 공고를 수집하고 표준 스키마로 정규화
    slug: ingestion

  - id: w-operator
    title: 운영자
    icon: 🧑‍💼
    description: 공고 품질 관리, 신고 처리, 수집 파이프라인 모니터링
    slug: operator

  - id: w-platform
    title: 플랫폼 기반
    icon: ⚙️
    description: 계정/인증/알림 등 전 World가 공유하는 기반 기능
    slug: platform

bundles:
  # 구직자 World
  - id: b-seeker-discovery
    world_id: w-seeker
    title: 공고 탐색
  - id: b-seeker-personal
    world_id: w-seeker
    title: 개인화 (저장·알림·이력)

  # 데이터 수집 World
  - id: b-ingest-collect
    world_id: w-ingest
    title: 공고 수집
  - id: b-ingest-normalize
    world_id: w-ingest
    title: 정규화·중복제거

  # 운영자 World
  - id: b-operator-admin
    world_id: w-operator
    title: 운영 콘솔

  # 플랫폼 World
  - id: b-platform-identity
    world_id: w-platform
    title: 계정·인증
  - id: b-platform-notify
    world_id: w-platform
    title: 알림 채널

blocks:
  # === 구직자 / 공고 탐색 ===
  - id: job-search
    bundle_id: b-seeker-discovery
    icon: 🔎
    name: 통합 공고 검색
    user_desc: 여러 사이트의 공고를 키워드·지역·직무로 한 번에 검색하는 기능이에요.
    tech_desc: Elasticsearch/OpenSearch 기반 Full-text 검색, 가중치 랭킹, 필터 aggregation 지원.
    priority: required
    effort_days: 6
    concerns: [search]

  - id: job-filter
    bundle_id: b-seeker-discovery
    icon: 🎛️
    name: 고급 필터
    user_desc: 경력·연봉·고용형태·회사 규모 등 조건으로 공고를 좁혀서 볼 수 있어요.
    tech_desc: Faceted search 구현, 다중 bool 쿼리, 필터 조합 영속화(URL 쿼리 파라미터).
    priority: required
    effort_days: 3
    concerns: [search]

  - id: job-detail
    bundle_id: b-seeker-discovery
    icon: 📄
    name: 공고 상세 보기
    user_desc: 공고 내용 전문과 원본 사이트 링크를 한 페이지에서 확인할 수 있어요.
    tech_desc: 정규화된 공고 상세 렌더링, 원본 URL redirect 추적, 조회수 집계.
    priority: required
    effort_days: 2

  - id: company-profile
    bundle_id: b-seeker-discovery
    icon: 🏢
    name: 회사별 공고 모아보기
    user_desc: 특정 회사의 진행 중인 모든 공고를 한눈에 모아봐요.
    tech_desc: Company 엔티티 기준 GROUP BY 쿼리, 회사 메타(로고·업종) 정규화.
    priority: optional
    effort_days: 3

  # === 구직자 / 개인화 ===
  - id: saved-jobs
    bundle_id: b-seeker-personal
    icon: ⭐
    name: 공고 저장(북마크)
    user_desc: 관심 공고를 북마크 해두고 나중에 다시 확인할 수 있어요.
    tech_desc: User-Job N:M 관계 테이블, 낙관적 토글 UI, 마감일 자동 만료 처리.
    priority: required
    effort_days: 2
    concerns: [concurrency]

  - id: job-alert
    bundle_id: b-seeker-personal
    icon: 🔔
    name: 새 공고 알림
    user_desc: 원하는 조건의 새 공고가 올라오면 이메일/푸시로 알려줘요.
    tech_desc: Saved-search 기반 스케줄러(Spring @Scheduled), diff 감지 후 알림 큐 발행.
    priority: required
    effort_days: 4
    concerns: [notification]

  - id: search-history
    bundle_id: b-seeker-personal
    icon: 🕒
    name: 검색 이력
    user_desc: 최근 검색한 키워드를 빠르게 다시 쓸 수 있어요.
    tech_desc: 사용자별 최근 검색어 LRU 캐시(Redis), 개인정보 보호 TTL 적용.
    priority: optional
    effort_days: 1
    concerns: [pii]

  # === 데이터 수집 ===
  - id: source-crawler
    bundle_id: b-ingest-collect
    icon: 🕷️
    name: 외부 사이트 크롤러
    user_desc: 잡코리아·사람인·워크넷에서 공고 데이터를 주기적으로 가져와요.
    tech_desc: Playwright/Jsoup 크롤러, robots.txt 준수, 사이트별 어댑터 패턴, 지수 백오프 재시도.
    priority: required
    effort_days: 8
    concerns: [crawling]

  - id: crawl-scheduler
    bundle_id: b-ingest-collect
    icon: ⏰
    name: 수집 스케줄러
    user_desc: 정해진 주기에 따라 자동으로 새 공고를 수집해요.
    tech_desc: Quartz Scheduler or Spring @Scheduled, cron 표현식 기반, 실패 시 DLQ 격리.
    priority: required
    effort_days: 2
    concerns: [crawling]

  - id: job-normalizer
    bundle_id: b-ingest-normalize
    icon: 🧹
    name: 공고 정규화
    user_desc: 사이트마다 다른 형식의 공고를 통일된 모습으로 정리해요.
    tech_desc: 소스별 파서 → 표준 JobPosting DTO 매핑, 직무/지역/연봉 코드화(ENUM 사전).
    priority: required
    effort_days: 5
    concerns: [crawling]

  - id: duplicate-detector
    bundle_id: b-ingest-normalize
    icon: 🔁
    name: 중복 공고 제거
    user_desc: 여러 사이트에 같이 올라온 공고를 하나로 묶어서 보여줘요.
    tech_desc: MinHash/SimHash 기반 유사도, (회사+제목+마감일) 복합키 지문, 클러스터링.
    priority: required
    effort_days: 4
    concerns: [search]

  - id: job-indexer
    bundle_id: b-ingest-normalize
    icon: 📚
    name: 검색 인덱스 갱신
    user_desc: 새로 들어온 공고를 검색에 바로 반영해요.
    tech_desc: OpenSearch bulk API, 형태소 분석기(Nori) 적용, 증분 인덱싱 + 주기적 재인덱싱.
    priority: required
    effort_days: 3
    concerns: [search]

  # === 운영자 ===
  - id: admin-dashboard
    bundle_id: b-operator-admin
    icon: 📊
    name: 운영 대시보드
    user_desc: 수집 상태와 사용자 활동을 운영자가 한눈에 볼 수 있어요.
    tech_desc: 관리자 전용 리포트(수집 성공률·DAU·검색 Top-N), Role 기반 인가(ADMIN).
    priority: required
    effort_days: 3
    concerns: [pii]

  - id: crawl-monitor
    bundle_id: b-operator-admin
    icon: 🩺
    name: 수집 파이프라인 모니터링
    user_desc: 크롤링이 제대로 돌고 있는지 운영자가 확인하고 재실행할 수 있어요.
    tech_desc: 소스별 성공률/에러 로그, 실패 job 수동 retry, Slack/Webhook 알람 훅.
    priority: required
    effort_days: 3

  - id: report-handler
    bundle_id: b-operator-admin
    icon: 🚩
    name: 공고 신고 처리
    user_desc: 사용자가 잘못된 공고를 신고하면 운영자가 검토·숨김 처리해요.
    tech_desc: Report 엔티티 + 상태 머신(OPEN→REVIEW→HIDDEN/REJECTED), 소프트 삭제.
    priority: optional
    effort_days: 2

  # === 플랫폼 기반 ===
  - id: user-account
    bundle_id: b-platform-identity
    icon: 👤
    name: 회원가입·로그인
    user_desc: 이메일이나 소셜 계정으로 로그인해서 개인화 기능을 써요.
    tech_desc: Spring Security + OAuth2(Google/Kakao), JWT Access/Refresh, BCrypt.
    priority: required
    effort_days: 4
    concerns: [auth, pii]

  - id: notification-gateway
    bundle_id: b-platform-notify
    icon: 📬
    name: 알림 전송 게이트웨이
    user_desc: 이메일·푸시 알림을 안정적으로 보내주는 기반이에요.
    tech_desc: 채널 추상화(EmailSender, WebPushSender), 템플릿 엔진(Thymeleaf), 전송 실패 재시도 큐.
    priority: required
    effort_days: 3
    concerns: [notification, realtime]

dependencies:
  # 검색 스택
  - source: job-search
    target: job-indexer
    type: requires
    reason: 통합 검색은 인덱서가 채운 검색 인덱스를 읽어 결과를 낸다.
  - source: job-filter
    target: job-search
    type: requires
    reason: 고급 필터는 검색 쿼리 빌더 위에서 facet/조건을 조합한다.
  - source: job-detail
    target: job-normalizer
    type: requires
    reason: 상세 뷰는 정규화된 JobPosting 스키마를 그대로 렌더링한다.
  - source: company-profile
    target: job-normalizer
    type: requires
    reason: 회사 엔티티는 정규화 단계에서 추출된 company 필드에 의존한다.

  # 개인화
  - source: saved-jobs
    target: user-account
    type: requires
    reason: 북마크는 로그인한 사용자 식별자에 귀속된다.
  - source: saved-jobs
    target: job-detail
    type: requires
    reason: 북마크 목록은 공고 상세 정보를 참조한다.
  - source: job-alert
    target: user-account
    type: requires
    reason: 알림 구독은 사용자 계정 단위로 관리된다.
  - source: job-alert
    target: job-search
    type: requires
    reason: 알림은 저장된 검색 조건을 주기적으로 재실행해 신규 공고를 감지한다.
  - source: job-alert
    target: notification-gateway
    type: requires
    reason: 감지된 신규 공고는 알림 게이트웨이를 통해 사용자에게 전달된다.
  - source: search-history
    target: user-account
    type: requires
    reason: 검색 이력은 사용자별로 분리 저장된다.

  # 수집 파이프라인
  - source: crawl-scheduler
    target: source-crawler
    type: requires
    reason: 스케줄러는 크롤러 job을 트리거하는 상위 오케스트레이터다.
  - source: job-normalizer
    target: source-crawler
    type: requires
    reason: 정규화는 크롤러가 수집한 원본(raw) 레코드를 입력으로 받는다.
  - source: duplicate-detector
    target: job-normalizer
    type: requires
    reason: 중복 판정은 정규화된 공통 스키마 위에서만 의미가 있다.
  - source: job-indexer
    target: duplicate-detector
    type: requires
    reason: 인덱스에는 중복 제거가 끝난 canonical 공고만 들어간다.

  # 운영자
  - source: admin-dashboard
    target: user-account
    type: requires
    reason: 관리자 페이지는 ADMIN 권한이 부여된 계정에 대해서만 접근을 허용한다.
  - source: crawl-monitor
    target: crawl-scheduler
    type: requires
    reason: 모니터링 UI는 스케줄러 job 상태/재실행 API에 의존한다.
  - source: report-handler
    target: job-detail
    type: requires
    reason: 신고는 특정 공고 엔티티에 연결되어 상태를 변경한다.
  - source: report-handler
    target: user-account
    type: requires
    reason: 신고자/처리자 추적을 위해 계정 식별이 필요하다.

  # 플랫폼 공용
  - source: notification-gateway
    target: user-account
    type: requires
    reason: 알림 전송 대상(이메일/디바이스 토큰)은 사용자 프로필에서 가져온다.
