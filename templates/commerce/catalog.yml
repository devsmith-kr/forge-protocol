# Forge Protocol — Commerce Template Catalog
# 쿠팡급 커머스 기준 블럭 카탈로그 v0.1.0

worlds:
  - id: w-seller
    title: "파는 사람의 세계"
    description: "판매자가 상품을 등록하고 관리하는 영역"
    order: 1
  - id: w-buyer
    title: "사는 사람의 세계"
    description: "구매자가 상품을 탐색하고 구매하는 영역"
    order: 2
  - id: w-logistics
    title: "물건이 이동하는 세계"
    description: "물류 입고부터 배송까지의 영역"
    order: 3
  - id: w-money
    title: "돈이 흐르는 세계"
    description: "결제, 환불, 정산의 영역"
    order: 4
  - id: w-admin
    title: "관리하는 세계"
    description: "운영자가 플랫폼을 관리하는 영역"
    order: 5
  - id: w-integration
    title: "연결하는 세계"
    description: "외부 시스템과의 연동 영역"
    order: 6

bundles:
  # 파는 사람의 세계
  - id: b-seller-product
    world_id: w-seller
    title: "상품 관리"
    description: "상품 등록, 수정, 삭제"
  - id: b-seller-inventory
    world_id: w-seller
    title: "재고 관리"
    description: "재고 수량 관리 및 품절 처리"
  # 사는 사람의 세계
  - id: b-buyer-auth
    world_id: w-buyer
    title: "가입/인증"
    description: "회원가입, 로그인, 소셜 인증"
  - id: b-buyer-browse
    world_id: w-buyer
    title: "상품 탐색"
    description: "검색, 카테고리, 상품 상세"
  - id: b-buyer-purchase
    world_id: w-buyer
    title: "구매"
    description: "장바구니, 주문"
  - id: b-buyer-after
    world_id: w-buyer
    title: "주문 이후"
    description: "주문 조회, 취소, 반품, 리뷰"
  # 돈이 흐르는 세계
  - id: b-money-payment
    world_id: w-money
    title: "결제 처리"
    description: "카드, 간편결제, 가상계좌"
  - id: b-money-refund
    world_id: w-money
    title: "환불"
    description: "환불 처리 및 부분 환불"
  - id: b-money-settle
    world_id: w-money
    title: "정산"
    description: "판매자 정산 및 수수료 계산"
  # 물건이 이동하는 세계
  - id: b-logistics-shipping
    world_id: w-logistics
    title: "배송"
    description: "배송 추적 및 배송 상태 관리"
  # 관리하는 세계
  - id: b-admin-ops
    world_id: w-admin
    title: "운영 도구"
    description: "대시보드, 통계, 공지사항"
  # 연결하는 세계
  - id: b-intg-notify
    world_id: w-integration
    title: "알림 시스템"
    description: "이메일, SMS, 카카오 알림톡"
  - id: b-intg-pay
    world_id: w-integration
    title: "결제 연동"
    description: "PG사 연동, 간편결제 연동"

blocks:
  # ── 파는 사람의 세계 ──
  - id: product-register
    bundle_id: b-seller-product
    name: "상품 등록"
    user_desc: "판매할 물건의 이름, 가격, 사진, 설명을 입력하는 기능이에요. 마켓에 물건을 진열하는 것과 같아요."
    tech_desc: "Product CRUD API, 이미지 업로드(S3), 카테고리 트리, 상품 상태 관리(임시저장/검수중/판매중/품절/판매종료)"
    analogy: "마켓에 상품 진열대에 물건을 올려놓는 것"
    priority: required
    effort_days: 5

  - id: product-category
    bundle_id: b-seller-product
    name: "카테고리 관리"
    user_desc: "상품을 종류별로 분류하는 기능이에요. 백화점 층별 안내도처럼요."
    tech_desc: "Category 트리 구조(Closure Table), 다단계 카테고리, 카테고리별 속성 템플릿"
    analogy: "백화점 층별 안내도"
    priority: required
    effort_days: 3

  - id: inventory-manage
    bundle_id: b-seller-inventory
    name: "재고 관리"
    user_desc: "물건이 몇 개 남았는지 관리하는 기능이에요. 창고 재고 장부와 같아요."
    tech_desc: "Stock 엔티티, 옵션별 재고 분리, Optimistic Lock(@Version)으로 동시성 제어, 안전재고 알림"
    analogy: "창고 재고 장부"
    priority: required
    effort_days: 4

  # ── 사는 사람의 세계 ──
  - id: buyer-signup
    bundle_id: b-buyer-auth
    name: "회원가입/로그인"
    user_desc: "사이트에 가입하고 로그인하는 기능이에요. 회원카드를 만드는 것과 같아요."
    tech_desc: "JWT 인증, OAuth2 소셜로그인(카카오/네이버/구글), 이메일 인증, 비밀번호 암호화(bcrypt)"
    analogy: "회원카드 만들기"
    priority: required
    effort_days: 4

  - id: product-search
    bundle_id: b-buyer-browse
    name: "상품 검색"
    user_desc: "원하는 물건을 키워드로 찾는 기능이에요. 검색엔진처럼 빠르게 결과를 보여줘요."
    tech_desc: "Elasticsearch 기반 Full-text search, 자동완성, 오타 보정, 필터(가격/평점/배송), 정렬"
    analogy: "백화점 안내데스크에서 물건 위치 물어보기"
    priority: required
    effort_days: 5

  - id: product-detail
    bundle_id: b-buyer-browse
    name: "상품 상세"
    user_desc: "상품의 자세한 정보를 보는 페이지예요. 상품 설명서를 읽는 것과 같아요."
    tech_desc: "상품 상세 API, 옵션 선택 UI, 리뷰 요약, 관련 상품 추천, 최근 본 상품"
    analogy: "상품 설명서 읽기"
    priority: required
    effort_days: 3

  - id: cart
    bundle_id: b-buyer-purchase
    name: "장바구니"
    user_desc: "사고 싶은 물건을 담아두는 기능이에요. 마트에서 카트에 물건 담는 것처럼요."
    tech_desc: "Cart 엔티티(Redis + DB 이중화), 비회원 장바구니(세션), 수량 변경, 품절 상품 알림"
    analogy: "마트 쇼핑카트"
    priority: required
    effort_days: 3

  - id: order
    bundle_id: b-buyer-purchase
    name: "주문"
    user_desc: "장바구니에 담은 물건을 실제로 구매하는 기능이에요. 계산대에서 결제하는 것과 같아요."
    tech_desc: "Order 엔티티, 주문번호 생성(UUID + 날짜), 주문 상태 머신(주문완료→결제완료→배송중→배송완료), 배송지 관리"
    analogy: "계산대에서 결제하기"
    priority: required
    effort_days: 5

  - id: order-history
    bundle_id: b-buyer-after
    name: "주문 내역"
    user_desc: "지금까지 주문한 내역을 확인하는 기능이에요. 영수증 모아보기와 같아요."
    tech_desc: "주문 목록 API(페이지네이션), 주문 상세, 주문 상태 실시간 추적, 재주문"
    analogy: "영수증 모아보기"
    priority: required
    effort_days: 2

  - id: cancel-return
    bundle_id: b-buyer-after
    name: "취소/반품"
    user_desc: "주문한 물건을 취소하거나 받은 물건을 돌려보내는 기능이에요."
    tech_desc: "취소 요청 API, 반품 요청 API, 취소/반품 상태 머신, 자동 환불 트리거, 반품 사유 수집"
    analogy: "백화점 환불 카운터"
    priority: required
    effort_days: 4

  - id: review
    bundle_id: b-buyer-after
    name: "리뷰"
    user_desc: "구매한 상품에 대한 후기를 남기는 기능이에요. 별점과 사진도 올릴 수 있어요."
    tech_desc: "Review CRUD, 별점(1-5), 사진 리뷰, 구매 확인 후에만 작성 가능, 리뷰 신고"
    analogy: "맛집 후기 남기기"
    priority: optional
    effort_days: 3

  - id: coupon
    bundle_id: b-buyer-purchase
    name: "쿠폰"
    user_desc: "할인받을 수 있는 쿠폰을 발급받고 사용하는 기능이에요. 할인 쿠폰을 오려서 쓰는 것과 같아요."
    tech_desc: "Coupon 엔티티, 발급/사용/만료 상태, 정액/정률 할인, 최소주문금액, 사용조건(카테고리/상품 한정), 중복 사용 방지"
    analogy: "할인 쿠폰 오려서 쓰기"
    priority: optional
    effort_days: 5

  # ── 돈이 흐르는 세계 ──
  - id: payment
    bundle_id: b-money-payment
    name: "결제"
    user_desc: "물건값을 지불하는 기능이에요. 카드, 계좌이체, 간편결제 등을 지원해요."
    tech_desc: "PG 연동(토스페이먼츠/이니시스), 결제 상태 머신, 결제 실패 재시도, 결제 검증(금액 위변조 방지)"
    analogy: "계산대에서 카드 긁기"
    priority: required
    effort_days: 5

  - id: refund
    bundle_id: b-money-refund
    name: "환불"
    user_desc: "결제한 금액을 돌려받는 기능이에요. 전액 환불, 부분 환불 모두 가능해요."
    tech_desc: "PG 환불 API 연동, 부분 환불, 환불 사유 기록, 환불 상태 추적, 쿠폰 복원 여부 결정"
    analogy: "영수증 들고 환불받기"
    priority: required
    effort_days: 4

  - id: settlement
    bundle_id: b-money-settle
    name: "정산"
    user_desc: "판매자에게 판매 대금을 정산해주는 기능이에요. 월급날에 급여 받는 것과 비슷해요."
    tech_desc: "정산 주기(D+n), 수수료 계산, 정산 내역 리포트, 세금계산서 연동, 판매자별 정산 계좌 관리"
    analogy: "월급날 급여 정산"
    priority: required
    effort_days: 7

  # ── 물건이 이동하는 세계 ──
  - id: shipping
    bundle_id: b-logistics-shipping
    name: "배송 추적"
    user_desc: "주문한 물건이 어디쯤 왔는지 확인하는 기능이에요. 택배 조회와 같아요."
    tech_desc: "택배사 API 연동(CJ/한진/롯데), 배송 상태 웹훅, 송장번호 자동 매핑, 배송 알림"
    analogy: "택배 조회하기"
    priority: required
    effort_days: 4

  - id: return-logistics
    bundle_id: b-logistics-shipping
    name: "반품 물류"
    user_desc: "반품된 물건을 수거하고 처리하는 기능이에요."
    tech_desc: "반품 수거 요청 API, 반품 검수 프로세스, 재입고/폐기 결정, 반품 배송비 정산"
    analogy: "반품 택배 보내기"
    priority: optional
    effort_days: 4

  # ── 관리하는 세계 ──
  - id: admin-dashboard
    bundle_id: b-admin-ops
    name: "관리자 대시보드"
    user_desc: "사이트 전체 현황을 한눈에 보는 기능이에요. 자동차 계기판처럼요."
    tech_desc: "매출/주문/회원 통계 API, 실시간 주문 모니터링, 차트(일별/주별/월별), 관리자 권한(RBAC)"
    analogy: "자동차 계기판"
    priority: optional
    effort_days: 5

  # ── 연결하는 세계 ──
  - id: notification
    bundle_id: b-intg-notify
    name: "알림"
    user_desc: "주문 확인, 배송 출발 같은 소식을 알려주는 기능이에요. 문자/카카오톡으로 받아요."
    tech_desc: "알림 이벤트 큐(SQS/Kafka), 채널별 발송(이메일/SMS/카카오 알림톡/앱푸시), 알림 템플릿, 발송 이력"
    analogy: "택배 출발 알림 문자"
    priority: optional
    effort_days: 4

  - id: pg-integration
    bundle_id: b-intg-pay
    name: "PG 연동"
    user_desc: "실제 결제가 이루어지게 하는 연결 장치예요. 카드사와 우리 사이트를 연결해줘요."
    tech_desc: "PG SDK 통합(토스페이먼츠 v2), 결제 위젯, 웹훅 수신, 결제 검증, 테스트/운영 환경 분리"
    analogy: "카드 단말기 설치"
    priority: required
    effort_days: 5

  - id: social-login
    bundle_id: b-buyer-auth
    name: "소셜 로그인"
    user_desc: "카카오, 네이버, 구글 계정으로 간편하게 로그인하는 기능이에요."
    tech_desc: "OAuth2 Authorization Code Flow, 카카오/네이버/구글 Provider, 기존 계정 연동, 토큰 갱신"
    analogy: "카카오 계정으로 한번에 로그인"
    priority: optional
    effort_days: 3

# ── 의존성 정의 ──
dependencies:
  # 주문은 장바구니, 결제가 필요
  - source: order
    target: cart
    type: requires
    condition: "주문 생성 시 장바구니 데이터 참조"
  - source: order
    target: payment
    type: requires
    condition: "주문 완료를 위해 결제 필수"
  - source: order
    target: buyer-signup
    type: requires
    condition: "주문하려면 회원가입 필요"

  # 결제는 PG 연동 필요
  - source: payment
    target: pg-integration
    type: requires
    condition: "실제 결제를 위해 PG사 연동 필수"

  # 환불은 결제, 취소/반품에 의존
  - source: refund
    target: payment
    type: requires
    condition: "환불하려면 결제 내역이 있어야 함"
  - source: refund
    target: cancel-return
    type: requires
    condition: "환불은 취소/반품 요청에서 트리거"

  # 정산은 결제, 환불에 의존
  - source: settlement
    target: payment
    type: requires
    condition: "정산은 결제 내역 기반"
  - source: settlement
    target: refund
    type: affects
    condition: "환불 발생 시 정산 금액 차감"

  # 배송은 주문에 의존
  - source: shipping
    target: order
    type: requires
    condition: "배송할 주문이 있어야 함"

  # 반품 물류는 취소/반품에 의존
  - source: return-logistics
    target: cancel-return
    type: requires
    condition: "반품 요청이 있어야 물류 처리 가능"

  # 취소/반품은 주문에 의존
  - source: cancel-return
    target: order
    type: requires
    condition: "취소/반품할 주문이 있어야 함"

  # 쿠폰의 영향 관계
  - source: coupon
    target: payment
    type: affects
    condition: "쿠폰 할인 금액이 결제 금액에서 차감"
  - source: coupon
    target: refund
    type: affects
    condition: "쿠폰 사용 주문 환불 시 쿠폰 복원 여부"
  - source: coupon
    target: settlement
    type: affects
    condition: "쿠폰 할인 비용 부담 주체(플랫폼 vs 판매자)"

  # 리뷰는 주문에 의존
  - source: review
    target: order
    type: requires
    condition: "구매 확인 후에만 리뷰 작성 가능"

  # 상품 관련 의존성
  - source: product-search
    target: product-register
    type: requires
    condition: "검색할 상품이 등록되어 있어야 함"
  - source: product-detail
    target: product-register
    type: requires
    condition: "상세 페이지에 표시할 상품 데이터 필요"
  - source: cart
    target: product-detail
    type: requires
    condition: "장바구니에 담을 상품 정보 필요"

  # 주문 내역
  - source: order-history
    target: order
    type: requires
    condition: "조회할 주문이 있어야 함"

# ── 캐스케이드 규칙 ──
cascades:
  - trigger: coupon
    add_blocks: []
    ask_questions:
