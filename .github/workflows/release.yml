name: Release

# v* 태그 푸시 시 npm publish + GitHub Release 생성.
# 예) git tag v0.2.0 && git push origin v0.2.0
#
# 필수 시크릿:
#   - NPM_TOKEN: npm 자동 배포 토큰 (Automation 타입 권장)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'npm publish --dry-run 으로 검증만 수행'
        type: boolean
        default: true

permissions:
  contents: write  # GitHub Release 생성
  id-token: write  # npm provenance
  packages: write

jobs:
  verify:
    name: Verify (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install CLI deps
        run: npm ci

      - name: Verify version vs tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Lint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check "lib/**/*.js" "bin/**/*.js" "test/**/*.js"

      - name: CLI smoke test
        run: node bin/forge.js --help

      - name: Run tests
        run: npm test

      - name: Install Web deps
        working-directory: web
        run: npm ci

      - name: Web build
        working-directory: web
        run: npm run build

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish (dry-run for workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --provenance --access public

      - name: Publish to npm
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[?$VERSION/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "${NOTES:-See commit history for details.}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes=See commit history for details." >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
