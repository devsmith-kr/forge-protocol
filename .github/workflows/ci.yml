name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: ESLint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check "lib/**/*.js" "bin/**/*.js" "test/**/*.js"

  test:
    name: Test (Node ${{ matrix.node-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # vitest 4.x 는 Node 20+ 필요 (Node 18 의 node:util 에 styleText 없음)
        node-version: [20, 22]
        os: [ubuntu-latest]
        include:
          # LTS 노드에서 Windows/macOS 커버 (CI 시간 절약)
          - node-version: 20
            os: windows-latest
          - node-version: 20
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: CLI smoke test
        run: node bin/forge.js --help

      - name: Run tests
        run: npm test

      - name: P0 생성 품질 회귀 smoke
        run: node scripts/verify-p0.mjs

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: npm audit
        run: npm audit --omit=dev

  web-build:
    name: Web UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # web/ 가 ../shared/api-inference.js 를 import 하는데 shared 의 transitive deps
      # (pluralize 등) 가 root node_modules 에서 resolve 되어야 한다. root install 필수.
      - name: Install root dependencies (for shared/ transitive)
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Install web dependencies
        working-directory: web
        run: npm install --no-audit --no-fund --prefer-offline --include=optional

      - name: Build
        working-directory: web
        run: npm run build
